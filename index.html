<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reciprocal Function Explorer - Meriden Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root {
            /* Meriden School Strathfield Color Palette */
            --meriden-navy: #002855;
            --meriden-gold: #DCAE32;
            --meriden-gold-dark: #b88e1c; /* Darker for better web contrast */
            --page-bg: #f4f6f8;
            --card-border: #e2e8f0;
        }

        body { 
            font-family: 'Open Sans', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: var(--page-bg); margin: 0; padding: 40px 20px; color: #334155; 
        }
        
        h1, h2 { 
            font-family: 'Lora', serif; 
            color: var(--meriden-navy); 
        }
        
        h1 { margin-top: 0; margin-bottom: 30px; font-size: 2.4rem; letter-spacing: -0.5px; }
        
        #layout { display: flex; gap: 25px; max-width: 1050px; width: 100%; }
        
        .card { 
            background: white; padding: 25px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0, 40, 85, 0.05); border: 1px solid var(--card-border);
            border-top: 5px solid var(--meriden-navy); /* Academic anchor line */
        }
        
        #plot-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        #sidebar { width: 340px; display: flex; flex-direction: column; gap: 20px; }
        
        h2 { margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        
        /* Premium Input Styling */
        input { 
            width: 100%; padding: 12px 15px; border: 2px solid #cbd5e1; 
            border-radius: 6px; font-size: 1.1rem; outline: none; transition: all 0.2s; 
            background: #f8fafc; font-family: monospace; box-sizing: border-box;
            color: var(--meriden-navy);
        }
        input:focus { border-color: var(--meriden-gold); background: #fff; box-shadow: 0 0 0 3px rgba(220, 174, 50, 0.2); }
        
        /* Preset Buttons */
        .presets { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .preset-btn {
            background: var(--page-bg); border: 1px solid #cbd5e1; padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; color: var(--meriden-navy); cursor: pointer; transition: all 0.2s;
            font-family: 'Open Sans', sans-serif; font-weight: 600;
        }
        .preset-btn:hover { background: var(--meriden-navy); color: white; border-color: var(--meriden-navy); }

        /* Data Row Styling */
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .stat-row:last-child { border-bottom: none; }
        .val { font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        
        .f-color { color: var(--meriden-navy); } 
        .g-color { color: var(--meriden-gold-dark); } 
        
        .hint { font-size: 0.9rem; color: #64748b; font-style: italic; margin-top: 15px; text-align: center; }
        #observations { font-size: 0.95rem; line-height: 1.5; color: #475569; min-height: 60px; }
    </style>
</head>
<body>

    <h1>Reciprocal Function Explorer</h1>

    <div id="layout">
        <div id="plot-card" class="card">
            <div id="plot"></div>
            <p class="hint">Move your mouse over the graph to see the relationship in real-time.</p>
        </div>

        <div id="sidebar">
            <div class="card">
                <h2>Define $f(x)$</h2>
                <input type="text" id="funcInput" value="x - 2" placeholder="e.g., x^2 - 4" oninput="update()">
                <div class="presets">
                    <button class="preset-btn" onclick="setFunction('x - 2')">Linear</button>
                    <button class="preset-btn" onclick="setFunction('x^2 - 4')">Quadratic</button>
                    <button class="preset-btn" onclick="setFunction('sin(x)')">Wave</button>
                    <button class="preset-btn" onclick="setFunction('2^x')">Exponential</button>
                </div>
            </div>

            <div class="card">
                <h2>Live Analytics</h2>
                <div class="stat-row"><span>$x$ value:</span> <span id="val-x" class="val">-</span></div>
                <div class="stat-row"><span class="f-color">$f(x)$</span> <span id="val-f" class="val f-color">-</span></div>
                <div class="stat-row"><span class="g-color">$g(x) = \frac{1}{f(x)}$</span> <span id="val-g" class="val g-color">-</span></div>
            </div>

            <div class="card">
                <h2>Key Observations</h2>
                <div id="observations">
                    Hover over the graph to analyze...
                </div>
            </div>
        </div>
    </div>

    <script>
        const katexConfig = {
            delimiters: [
                {left: "$$", right: "$$", display: true},
                {left: "$", right: "$", display: false}
            ]
        };

        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, katexConfig);
        });

        function setFunction(fn) {
            document.getElementById('funcInput').value = fn;
            update();
        }

        function update() {
            const f_text = document.getElementById('funcInput').value;
            const g_text = `1/(${f_text})`;

            try {
                const instance = functionPlot({
                    target: '#plot',
                    width: 600,
                    height: 450,
                    grid: true,
                    disableZoom: true,
                    xAxis: { domain: [-6, 6] },
                    yAxis: { domain: [-6, 6] },
                    annotations: [
                        { y: 1, text: 'y = 1' },
                        { y: -1, text: 'y = -1' }
                    ],
                    data: [
                        { fn: f_text, color: '#002855', graphType: 'polyline' }, // Meriden Navy
                        { fn: g_text, color: '#b88e1c', graphType: 'polyline' }  // Meriden Gold
                    ]
                });

                instance.on('mousemove', (coords) => {
                    const x = coords.x.toFixed(2);
                    try {
                        const f_val = math.evaluate(f_text, { x: coords.x });
                        const g_val = 1 / f_val;

                        document.getElementById('val-x').innerText = x;
                        document.getElementById('val-f').innerText = f_val.toFixed(3);
                        
                        if (Math.abs(g_val) > 100) {
                            document.getElementById('val-g').innerText = "± Infinity";
                        } else {
                            document.getElementById('val-g').innerText = g_val.toFixed(3);
                        }

                        updateObservations(f_val, g_val);
                    } catch (e) {}
                });

            } catch (err) {}
        }

        function updateObservations(f, g) {
            let msg = "";
            if (Math.abs(f) < 0.1) {
                msg = "⚠️ <b>Asymptote Alert:</b> $f(x)$ is near zero, so $g(x)$ is shooting toward infinity.";
            } else if (Math.abs(Math.abs(f) - 1) < 0.05) {
                msg = "✨ <b>Invariant Point:</b> $f(x)$ is $1$ (or $-1$), so it equals its own reciprocal!";
            } else if (Math.abs(f) > 4) {
                msg = "📉 <b>Decay:</b> As $f(x)$ grows larger, $g(x)$ gets closer and closer to the x-axis ($y=0$).";
            } else {
                msg = "Move near $y=0$ or $y=1$ to see special behaviors.";
            }
            
            const obsEl = document.getElementById('observations');
            obsEl.innerHTML = msg;
            renderMathInElement(obsEl, katexConfig);
        }

        update();
    </script>
</body>
</html>
